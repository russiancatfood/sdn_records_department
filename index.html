<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN Career Growth Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #102529;
            --panel:        #0b1520;
            --panel-alt:    #091019;
            --cyan:         #00c8ff;
            --cyan-dim:     rgba(0, 200, 255, 0.2);
            --cyan-glow:    rgba(0, 200, 255, 0.35);
            --amber:        #ffaa00;
            --amber-dim:    rgba(255, 170, 0, 0.15);
            --green:        #00ff9f;
            --red:          #ff3c3c;
            --red-dim:      rgba(255, 60, 60, 0.12);
            --text:         #7aa8c0;
            --text-bright:  #cce8f4;
            --mono:         'Share Tech Mono', 'Courier New', monospace;
            --display:      'Orbitron', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.07) 3px,
                rgba(0, 0, 0, 0.07) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Subtle dot grid */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(0, 200, 255, 0.07) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }

        /* ── HEADER ──────────────────────────────────────── */
        .console-header {
            text-align: center;
            padding-bottom: 20px;
        }

        .header-eyebrow {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--cyan-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .header-eyebrow span {
            color: var(--cyan);
            opacity: 0.5;
        }

        .console-title {
            font-family: var(--display);
            font-size: clamp(20px, 4.5vw, 34px);
            font-weight: 900;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-shadow: 0 0 18px var(--cyan-glow), 0 0 40px rgba(0,200,255,0.15);
        }

        .console-subtitle {
            font-size: 11px;
            letter-spacing: 0.22em;
            color: var(--text);
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.8;
        }

        .header-rule {
            height: 1px;
            margin: 18px 0 16px;
            background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, var(--cyan) 60%, transparent 100%);
            opacity: 0.35;
        }

        /* ── STATUS BAR ──────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text);
            padding: 8px 14px;
            border-top: 1px solid var(--cyan-dim);
            border-bottom: 1px solid var(--cyan-dim);
            background: var(--panel-alt);
            margin-bottom: 20px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green), 0 0 12px rgba(0,255,159,0.4);
            flex-shrink: 0;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.25; }
        }

        .status-sep {
            opacity: 0.25;
        }

        .status-right {
            margin-left: auto;
            opacity: 0.4;
        }

        /* ── PANELS ──────────────────────────────────────── */
        .panel {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--cyan-dim);
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Corner brackets */
        .panel::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 14px; height: 14px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }
        .panel::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 14px; height: 14px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .panel-label {
            font-family: var(--display);
            font-size: 9px;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            padding-bottom: 12px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--cyan-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── UPLOAD ZONE ─────────────────────────────────── */
        #uploadZone {
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        #uploadZone:hover,
        #uploadZone.dragover {
            border-color: rgba(0, 200, 255, 0.55);
            background: rgba(0, 200, 255, 0.04);
            box-shadow: inset 0 0 40px rgba(0, 200, 255, 0.04), 0 0 24px rgba(0, 200, 255, 0.08);
        }

        .upload-inner {
            border: 1px dashed rgba(0, 200, 255, 0.25);
            padding: 52px 24px;
            text-align: center;
            pointer-events: none;
        }

        #uploadZone.dragover .upload-inner {
            border-color: rgba(0, 200, 255, 0.6);
        }

        .upload-icon {
            color: var(--cyan);
            opacity: 0.5;
            display: block;
            margin: 0 auto 18px;
        }

        .upload-title {
            font-family: var(--display);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .upload-sub {
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--text);
            text-transform: uppercase;
            opacity: 0.65;
        }

        /* ── INFO GRID ───────────────────────────────────── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 560px) {
            .info-grid { grid-template-columns: 1fr; }
        }

        .info-cell {
            background: var(--panel-alt);
            border: 1px solid var(--cyan-dim);
            padding: 10px 14px;
        }

        .info-key {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .info-val {
            font-size: 13px;
            color: var(--text-bright);
        }

        /* ── ERROR ───────────────────────────────────────── */
        #errorDisplay {
            position: relative;
            background: var(--red-dim);
            border: 1px solid rgba(255, 60, 60, 0.35);
            padding: 16px;
            margin-bottom: 16px;
        }

        #errorDisplay::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 12px; height: 12px;
            border-top: 2px solid var(--red);
            border-left: 2px solid var(--red);
        }

        #errorDisplay::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 12px; height: 12px;
            border-bottom: 2px solid var(--red);
            border-right: 2px solid var(--red);
        }

        .error-head {
            font-family: var(--display);
            font-size: 10px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        #errorMessage {
            font-size: 12px;
            color: rgba(255, 100, 100, 0.85);
        }

        /* ── SEARCH ──────────────────────────────────────── */
        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--cyan-dim);
            background: var(--panel-alt);
            padding: 8px 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-row:focus-within {
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.12);
        }

        .search-prompt {
            font-size: 13px;
            color: var(--cyan);
            opacity: 0.7;
            flex-shrink: 0;
        }

        #searchInput {
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-bright);
            width: 100%;
            caret-color: var(--cyan);
        }

        #searchInput::placeholder {
            color: rgba(122, 168, 192, 0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── TABLE ───────────────────────────────────────── */
        .record-count {
            font-family: var(--display);
            font-size: 9px;
            color: var(--amber);
            letter-spacing: 0.15em;
        }

        .table-scroll {
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan-dim) transparent;
        }

        .table-scroll::-webkit-scrollbar       { width: 3px; }
        .table-scroll::-webkit-scrollbar-track  { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb  { background: var(--cyan-dim); }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            font-family: var(--display);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cyan);
            padding: 10px 14px;
            border-bottom: 1px solid var(--cyan-dim);
            text-align: left;
            background: var(--panel);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        tbody tr {
            border-bottom: 1px solid rgba(0, 200, 255, 0.04);
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(0, 200, 255, 0.04);
        }

        tbody td {
            padding: 8px 14px;
            font-size: 13px;
        }

        tbody td:first-child { color: var(--text-bright); }

        tbody td:last-child {
            color: var(--amber);
            text-shadow: 0 0 8px rgba(255, 170, 0, 0.3);
        }

        /* ── BUTTON ──────────────────────────────────────── */
        .btn-console {
            position: relative;
            font-family: var(--display);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cyan);
            background: transparent;
            border: 1px solid rgba(0, 200, 255, 0.4);
            padding: 11px 32px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: inline-block;
        }

        .btn-console::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 9px; height: 9px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }

        .btn-console::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 9px; height: 9px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .btn-console:hover {
            background: rgba(0, 200, 255, 0.08);
            border-color: var(--cyan);
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.2);
        }

        /* ── UTILS ───────────────────────────────────────── */
        .d-none     { display: none !important; }
        .text-center { text-align: center; }
        .mt-reset   { margin-top: 28px; }
    </style>
</head>
<body>
<div class="page">

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-dot"></div>
        <span>SYSTEM ONLINE</span>
        <span class="status-sep">|</span>
        <span>PARSER READY</span>
        <span class="status-right">SDN-CG-01 // SEC-LVL 3</span>
    </div>

    <!-- Upload Zone -->
    <div id="uploadZone" class="panel">
        <div class="panel-label">
            <span>// DATA INPUT</span>
        </div>
        <div class="upload-inner">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383z"/>
                <path fill-rule="evenodd" d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3z"/>
            </svg>
            <div class="upload-title">Drop Save File to Initialize</div>
            <div class="upload-sub">Accepts: Dispatch SaveSlot &nbsp;(.sav)</div>
        </div>
        <input type="file" id="fileInput" class="d-none" accept=".sav">
    </div>

    <!-- File Info Section -->
    <div id="fileInfoSection" class="d-none">

        <!-- Metadata -->
        <div class="panel">
            <div class="panel-label">// File Metadata</div>
            <div class="info-grid">
                <div class="info-cell">
                    <div class="info-key">File Name</div>
                    <div class="info-val" id="fileName">—</div>
                </div>
                <div class="info-cell">
                    <div class="info-key">File Size</div>
                    <div class="info-val" id="fileSize">—</div>
                </div>
                <div class="info-cell">
                    <div class="info-key">Engine Version</div>
                    <div class="info-val" id="engineVersion">—</div>
                </div>
                <div class="info-cell">
                    <div class="info-key">Save Version</div>
                    <div class="info-val" id="saveVersion">—</div>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="errorDisplay" class="d-none" role="alert">
            <div class="error-head">!! Parse Error</div>
            <div id="errorMessage"></div>
        </div>

        <!-- Stats -->
        <div class="panel">
            <div class="panel-label">
                <span>// Career Stats</span>
                <span class="record-count">Records: <span id="varCount">0</span></span>
            </div>
            <div class="search-row">
                <span class="search-prompt">&gt;_</span>
                <input type="text" id="searchInput" placeholder="Filter stats...">
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width:55%;">Stat Name</th>
                            <th style="width:45%;">Value</th>
                        </tr>
                    </thead>
                    <tbody id="variablesTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Reset -->
        <div class="text-center mt-reset">
            <button class="btn-console" id="resetBtn">Load New File</button>
        </div>

    </div>
</div>

<script type="module">
    import { SavReader } from './gvas_parser/sav_reader.js';

    const uploadZone     = document.getElementById('uploadZone');
    const fileInput      = document.getElementById('fileInput');
    const fileInfoSection= document.getElementById('fileInfoSection');
    const fileNameEl     = document.getElementById('fileName');
    const fileSizeEl     = document.getElementById('fileSize');
    const engineVersionEl= document.getElementById('engineVersion');
    const saveVersionEl  = document.getElementById('saveVersion');
    const errorDisplay   = document.getElementById('errorDisplay');
    const errorMessage   = document.getElementById('errorMessage');
    const varCount       = document.getElementById('varCount');
    const variablesTable = document.getElementById('variablesTable');
    const searchInput    = document.getElementById('searchInput');
    const resetBtn       = document.getElementById('resetBtn');

    let allStats = {};

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
    });

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function processFile(file) {
        fileNameEl.textContent = file.name;
        fileSizeEl.textContent = formatFileSize(file.size);
        errorDisplay.classList.add('d-none');
        fileInfoSection.classList.remove('d-none');
        uploadZone.classList.add('d-none');

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const savReader = new SavReader(e.target.result);
                const properties = savReader.readWholeBuffer();

                const header = properties[0];
                engineVersionEl.textContent = header?.engine_version ?? 'N/A';
                saveVersionEl.textContent   = header?.save_game_version ?? 'N/A';

                // Extract stats — same logic as test_parser.js
                allStats = {};
                for (const prop of properties) {
                    if (prop.type === "ArrayProperty" && prop.name === "SceneSnapshots") {
                        for (let i = 0; i < prop.value.length; i++) {
                            for (let j = 0; j < prop.value[i][1].value.length; j++) {
                                const name  = prop.value[i][1].value[j][0];
                                const value = prop.value[i][1].value[j][1][0].value;
                                if (name.startsWith("BV_") || name.startsWith("NV_")) {
                                    const view = new DataView(new Uint8Array(value).buffer);
                                    const converted = parseInt(view.getFloat32(4, true));
                                    if (allStats[name] == null || converted > allStats[name]) {
                                        allStats[name] = converted;
                                    }
                                }
                            }
                        }
                    }
                }

                renderStats('');
            } catch (err) {
                errorDisplay.classList.remove('d-none');
                errorMessage.textContent = err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function renderStats(filter) {
        const lower = filter.toLowerCase();
        const entries = Object.entries(allStats).filter(([name]) =>
            name.toLowerCase().includes(lower)
        );
        varCount.textContent = entries.length;
        variablesTable.innerHTML = entries
            .map(([name, value]) => `<tr><td>${name}</td><td>${value}</td></tr>`)
            .join('');
    }

    searchInput.addEventListener('input', () => renderStats(searchInput.value));

    resetBtn.addEventListener('click', () => {
        fileInput.value = '';
        fileInfoSection.classList.add('d-none');
        uploadZone.classList.remove('d-none');
        errorDisplay.classList.add('d-none');
        searchInput.value = '';
        variablesTable.innerHTML = '';
        allStats = {};
    });
</script>
</body>
</html>
